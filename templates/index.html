<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محامي تونس - خبير القانون التونسي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            color: #a0a0c0;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 18px;
            border-radius: 12px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .bot-message {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: #666;
            background: #f0f0f0;
            font-size: 0.9rem;
        }

        .loading.active {
            display: block;
        }

        .chat-box::-webkit-scrollbar {
            width: 8px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }

        .chat-box::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }

        .welcome-message {
            text-align: center;
            color: #666;
            padding: 20px;
            background: #f0f0f5;
            border-radius: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>محامي تونس</h1>
        <p>خبير القانون التونسي - اسأل عن أي قانون أو مادة قانونية</p>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="welcome-message">
                مرحباً! أنا خبير القانون التونسي.<br>
                اسألني أي سؤال حول القوانين التونسية.
            </div>
        </div>

        <div class="loading" id="loading">
            جاري كتابة الإجابة...
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب سؤالك القانوني هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">إرسال</button>
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message) return;

            const chatBox = document.getElementById('chatBox');
            const loading = document.getElementById('loading');
            const sendBtn = document.getElementById('sendBtn');

            // Remove welcome message on first send
            const welcome = chatBox.querySelector('.welcome-message');
            if (welcome) {
                welcome.remove();
            }

            chatBox.innerHTML += `<div class="message user-message">${escapeHtml(message)}</div>`;
            input.value = '';

            chatBox.scrollTop = chatBox.scrollHeight;

            loading.classList.add('active');
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                loading.classList.remove('active');

                if (data.response) {
                    chatBox.innerHTML += `<div class="message bot-message">${escapeHtml(data.response)}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message bot-message">عذراً، حدث خطأ. يرجى المحاولة مرة أخرى.</div>`;
                }
            } catch (error) {
                loading.classList.remove('active');
                chatBox.innerHTML += `<div class="message bot-message">عذراً، حدث خطأ في الاتصال.</div>`;
            }

            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
